<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Puchki ❤️</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: 'Poppins', sans-serif;
    color:white;
}

/* 🎥 Background */
#bgVideo {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter:brightness(0.5);
}

/* 💖 Hearts Rain */
.heart {
    position:fixed;
    color:#ff4e50;
    animation: fall linear infinite;
    font-size:20px;
}
@keyframes fall {
    0% {transform:translateY(-100px);}
    100% {transform:translateY(100vh);}
}

/* 🌸 Flowers */
.flower {
    position:fixed;
    font-size:20px;
    animation: float 6s linear infinite;
}
@keyframes float {
    0% {transform:translateY(100vh);}
    100% {transform:translateY(-10vh);}
}

/* 🎬 Text */
.hero {
    text-align:center;
    margin-top:25%;
    font-size:2em;
    animation:fade 2s;
}
@keyframes fade {
    from{opacity:0;}
    to{opacity:1;}
}

/* 📸 Photo */
.photo img {
    width:250px;
    border-radius:20px;
    box-shadow:0 0 30px pink;
}

/* 💌 Button */
.btn {
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 20px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff4e50,#ff758c);
    color:white;
    cursor:pointer;
}

/* 🎂 Cake */
.cake {
    font-size:50px;
    animation: bounce 1s infinite alternate;
}
@keyframes bounce {
    from {transform:translateY(0);}
    to {transform:translateY(-20px);}
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="bg.mp4">
</video>

<audio id="music" src="raat.mp3"></audio>
<audio id="voice" src="voice.mp3"></audio>

<div id="main" class="hero" style="display:none;">
<h1>For My Puchki ❤️</h1>
<h2>Kavita 💖</h2>

<div class="photo">
<img src="yourphoto.jpg">
</div>

<div id="letter"></div>

<div class="cake">🎂</div>
</div>

<button onclick="openSecret()" class="btn">💌 Open Me</button>

<script>

/* 🎬 Start */
setTimeout(()=>{
document.getElementById("main").style.display="block";
playMusic();
typeWriter();
createHearts();
createFlowers();
},2000);

/* 🎶 Music */
function playMusic(){
let m=document.getElementById("music");
m.volume=0;
m.play();
let v=0;
let i=setInterval(()=>{
if(v<1){v+=0.05;m.volume=v;}
else clearInterval(i);
},200);
}

/* 💌 Letter */
let text="Hello! Beautiful😍, I am here to tell you that you are the most beautiful girl in the whole world😘💗. I love you forever ❤️ — Rahul";
let i=0;
function typeWriter(){
if(i<text.length){
document.getElementById("letter").innerHTML+=text[i];
i++;
setTimeout(typeWriter,40);
}
}

/* 💖 Hearts */
function createHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);
}

/* 🌸 Flowers */
function createFlowers(){
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
document.body.appendChild(f);
setTimeout(()=>f.remove(),6000);
},800);
}

/* 🔐 Secret */
function openSecret(){
let pass=prompt("Enter password 💖");

if(pass==="puchki"){

/* 💥 Fireworks */
for(let i=0;i<20;i++){
let f=document.createElement("div");
f.style.position="fixed";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";
f.style.fontSize="30px";
f.innerHTML="✨";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}

/* 🎤 Voice */
let v=document.getElementById("voice");
v.play();

/* 💖 Popup */
let o=document.createElement("div");
o.innerHTML=`
<div style="
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:9999;
">

<h1>💖 My Hidden Message 💖</h1>
<p>Thankyou so much Puchki, for making my life so beautiful And to understand me to believe me ❤️</p>
<p>No matter who comes in my life,you are best and I never want to compare anyone to yuou because it useless</p>
<p>For comming my life 🌸</p>
<p>I made this just for you 💖</p>
<h2>Forever Yours — MR.Tharki ❤️</h2>

<button onclick="this.parentElement.parentElement.remove()" 
style="padding:10px 20px;border:none;border-radius:20px;background:#ff4e50;color:white;">
Close ❌
</button>

</div>`;
document.body.appendChild(o);

}else{
alert("Wrong password 😜");
}
}

</script>

</body>
</html>
